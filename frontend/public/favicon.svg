<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background rounded rect -->
  <rect width="64" height="64" rx="14" fill="#1a1d2e"/>
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Clipboard shape -->
  <rect x="16" y="14" width="32" height="38" rx="5" fill="url(#g)" opacity="0.15"/>
  <rect x="16" y="14" width="32" height="38" rx="5" fill="none" stroke="#6366f1" stroke-width="2.2"/>
  <!-- Clip top notch -->
  <rect x="26" y="11" width="12" height="7" rx="3" fill="#1a1d2e" stroke="#6366f1" stroke-width="2"/>
  <!-- Check lines -->
  <line x1="22" y1="28" x2="42" y2="28" stroke="#818cf8" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="22" y1="35" x2="36" y2="35" stroke="#818cf8" stroke-width="2.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="22" y1="42" x2="30" y2="42" stroke="#818cf8" stroke-width="2.2" stroke-linecap="round" opacity="0.35"/>
  <!-- Checkmark accent -->
  <polyline points="37,39 40,43 46,36" fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
